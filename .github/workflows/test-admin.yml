name: Deepsel CMS - Admin Tests

on:
  workflow_call:
  pull_request:
    paths:
      - 'packages/admin/**'
      - 'packages/cms-utils/**'
      - 'packages/cms-react/**'
      - '.github/workflows/test-admin.yml'
  push:
    branches:
      - main
    paths:
      - 'packages/admin/**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: https://registry.npmjs.org
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Ensure SWC native binding
        run: npm install --no-save @swc/core-linux-x64-gnu@1.15.17 || true

      - name: Build workspace dependencies
        run: |
          npm run build --workspace=packages/cms-utils
          npm run build --workspace=packages/cms-react

      - name: Run unit tests
        run: npm test --workspace=@deepsel/admin

      - name: Build library
        run: npm run build:lib --workspace=@deepsel/admin
