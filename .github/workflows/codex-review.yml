name: Codex Code Review

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - '**.py'
      - 'pyproject.toml'
      - 'Makefile'
      - '.github/workflows/**'

jobs:
  codex-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      final_message: ${{ steps.run_codex.outputs.final-message }}

    steps:
      - uses: actions/checkout@v5
        with:
          # Explicitly check out the PR's merge commit
          ref: refs/pull/${{ github.event.pull_request.number }}/merge

      - name: Pre-fetch base and head refs for the PR
        run: |
          git fetch --no-tags origin \
            ${{ github.event.pull_request.base.ref }} \
            +refs/pull/${{ github.event.pull_request.number }}/head

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache Python dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          make install-dev

      - name: Run Codex Code Review
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: workspace-write
          prompt: |
            This is PR #${{ github.event.pull_request.number }} for ${{ github.repository }}.
            Base SHA: ${{ github.event.pull_request.base.sha }}
            Head SHA: ${{ github.event.pull_request.head.sha }}

            Read `CLAUDE.md` at the repo root first — it documents the architecture, conventions, and patterns you should use as the baseline for this review.

            This is the `deepsel` Python framework (PyPI package): FastAPI + SQLAlchemy 2.0, ORM mixins, auto-generated CRUD (REST + GraphQL), multi-tenancy, auth (JWT/OAuth/SAML/2FA), pluggable storage.

            Review ONLY the changes introduced by this PR. Categorize your feedback by severity:

            🔴 **Blocking Issues** (must fix before merge):
            - Security vulnerabilities (SQL injection, auth bypass, secret leaks, unsafe deserialization)
            - Permission/multi-tenancy bypasses (skipping `_check_has_permission`, queries ignoring `organization_id`, leaking cross-tenant data)
            - Data integrity issues (missing FK/cascade rules, race conditions, broken `string_id` references, schema drift the auto-migrator can't handle)
            - Breaking public API changes (ORM mixin signatures, `CRUDRouter`, GraphQL factory, utils surface) without a version bump or migration note
            - Critical bugs that cause crashes, data loss, or import failures (especially around lazy `__getattr__` imports that defer optional extras)

            🟡 **Important Issues** (should fix):
            - Performance problems (N+1 queries, missing indexes, unbatched email sends)
            - Missing error handling, structured logging, or type hints
            - Missing tests for critical paths (tests use testcontainers — no external DB setup needed)
            - Patterns that violate conventions in `CLAUDE.md` (e.g. eager-importing optional deps at module top instead of lazy `__getattr__`)
            - Pydantic v2 / SQLAlchemy 2.0 style violations

            🟢 **Suggestions** (nice to have):
            - Code style (Black 88 chars, flake8), documentation, refactoring, additional test coverage

            For each issue: specify file and line number, explain the problem clearly. Be concise, specific, and constructive. Skip trivial issues.

            Pull request title and body:
            ----
            ${{ github.event.pull_request.title }}

            ${{ github.event.pull_request.body }}

  post-feedback:
    runs-on: ubuntu-latest
    needs: codex-review
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Post Codex feedback as PR comment
        uses: actions/github-script@v7
        env:
          CODEX_FINAL_MESSAGE: ${{ needs.codex-review.outputs.final_message }}
        with:
          github-token: ${{ github.token }}
          script: |
            const message = process.env.CODEX_FINAL_MESSAGE;
            const hasBlockingIssues = message.includes('🔴');
            const emoji = hasBlockingIssues ? '🚨' : '✅';
            const title = hasBlockingIssues ? 'Codex Review - Issues Found' : 'Codex Review - Looks Good';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `## ${emoji} ${title}\n\n${message}\n\n---\n*Powered by OpenAI Codex*`,
            });
