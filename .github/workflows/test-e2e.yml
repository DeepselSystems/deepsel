name: Deepsel - E2E Tests

on:
  pull_request:
    paths:
      - 'deepsel/**'
      - 'client/**'
      - 'packages/**'
      - 'themes/**'
      - 'tests/e2e/**'
      - 'pyproject.toml'
      - 'Makefile'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/test-e2e.yml'
  push:
    branches:
      - main
    paths:
      - 'deepsel/**'
      - 'client/**'
      - 'packages/**'
      - 'themes/**'
      - 'tests/e2e/**'
      - 'pyproject.toml'
      - 'Makefile'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/test-e2e.yml'

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'
          cache-dependency-path: package-lock.json

      # `server` carries uvicorn + python-dotenv, kept out of `dev` since the
      # library itself never imports them — only a consumer app booting the
      # ASGI server needs them (see pyproject.toml's `server` extra comment).
      - name: Install backend (editable, with dev + server extras)
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -e ".[dev,auth,oauth,storage,server]"

      - name: Install Node workspaces
        run: npm ci

      # client/ depends on the built dist/ output of these three packages, not
      # their source — the npm workspace symlink alone isn't enough.
      - name: Build shared packages (cms-utils, cms-react)
        run: npm run build:packages

      - name: Build admin bundle
        run: npm run build:admin

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('tests/e2e/package.json') }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
        working-directory: tests/e2e

      - name: Install Playwright system deps (cached browsers)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
        working-directory: tests/e2e

      - name: Run E2E tests
        run: npm run e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/e2e/playwright-report
          retention-days: 7

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: tests/e2e/test-results
          retention-days: 7
